spring:
  datasource:
    url: jdbc:sqlite:./data/knowvault.db?foreign_keys=on
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

server:
  port: 8080

knowvault:
  import:
    temp-dir: ./data/temp
    max-file-size: 524288000
