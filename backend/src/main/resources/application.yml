spring:
  datasource:
    url: jdbc:sqlite:./data/knowvault.db?foreign_keys=on
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 1500MB
      max-request-size: 1500MB
server:
  port: 8080
  tomcat:
    connection-timeout: 1800000   # 30 minutes for large file uploads
knowvault:
  import:
    temp-dir: ./data/temp
    max-file-size: 1610612736
  ai:
    provider: gemini
    gemini:
      api-key: AIzaSyTestKey12345
      model: gemini-2.0-flash
    ollama:
      base-url: http://localhost:11434
      model: llama3
